            --disable-doc \
            --disable-ffplay \
            --disable-programs \
            --enable-network \
            --extra-cflags="-I$HOME/davs2-install/include -fPIC" \
            --extra-ldflags="-L$HOME/davs2-install/lib -Wl,-rpath,$HOME/davs2-install/lib"
          make -j$(nproc)
          make install
          sudo ldconfig
          echo "=== FFmpeg decoders (cavs/avs2) ==="
          "$HOME/ffmpeg-cavs/bin/ffmpeg" -decoders 2>/dev/null | grep -E "cavs|avs2" || true
          echo "PKG_CONFIG_PATH=$HOME/ffmpeg-cavs/lib/pkgconfig:$HOME/davs2-install/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Build mpv
        run: |
          export PKG_CONFIG_PATH="$HOME/ffmpeg-cavs/lib/pkgconfig:$HOME/davs2-install/lib/pkgconfig:$PKG_CONFIG_PATH"
          cd build/mpv
          git clone --depth 1 https://github.com/mpv-player/mpv.git .
          meson setup build_dir \
            --prefix="$HOME/mpv-install" \
            --buildtype=release \
            -Dlibmpv=true \
            -Dcplayer=false \
            -Dgpl=true \
            -Dlibavdevice=enabled
          meson compile -C build_dir
          meson install -C build_dir
          echo "=== libmpv install tree ==="
          find "$HOME/mpv-install" -name "libmpv*" -ls

      - name: Package libmpv
        run: |
          STAGING="release/libmpv-cavs-linux-arm64"
          mkdir -p "$STAGING/lib"
          cp -L "$HOME/mpv-install/lib/libmpv.so.2" "$STAGING/lib/" 2>/dev/null || \
            cp -L "$HOME/mpv-install/lib/"libmpv.so* "$STAGING/lib/"
          cp -L "$HOME/ffmpeg-cavs/lib/"libav*.so* "$STAGING/lib/" 2>/dev/null || true
          cp -L "$HOME/ffmpeg-cavs/lib/"libsw*.so* "$STAGING/lib/" 2>/dev/null || true
          cp -L "$HOME/davs2-install/lib/"libdavs2.so* "$STAGING/lib/" 2>/dev/null || true
          mkdir -p "$STAGING/include/mpv"
          cp -r "$HOME/mpv-install/include/mpv/"* "$STAGING/include/mpv/"
          cd "$STAGING/lib"
          if [ ! -L libmpv.so.2 ] && [ -f libmpv.so.2.* ]; then
            ln -sf libmpv.so.2.* libmpv.so.2
          fi
          cd ../../..
          cd release
          tar czf libmpv-cavs-linux-arm64.tar.gz libmpv-cavs-linux-arm64
          ls -la libmpv-cavs-linux-arm64.tar.gz

      - name: Verify CAVS support
        run: |
          echo "=== Checking cavs/avs2 strings in libmpv ==="
          STAGING="release/libmpv-cavs-linux-arm64/lib"
          find "$STAGING" -name "libmpv*" -exec sh -c 'echo "--- {} ---"; strings "{}" | grep -iE "guangdian|jizhun|cavs|avs2|libdavs2" | head -20' \;
          echo "=== ldd output (libmpv dependencies) ==="
          ldd "$STAGING"/libmpv.so.2 2>/dev/null | head -30

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-cavs-linux-arm64
          path: release/libmpv-cavs-linux-arm64.tar.gz
          retention-days: 1

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: release/libmpv-cavs-linux-arm64.tar.gz
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
