name: Build and Publish App

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to upload the executables to."
        required: true
        type: string

permissions:
  contents: write

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: utf-8
  MPV_URL: "https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/20260610/mpv-dev-x86_64-v3-20260610-git-304426c.7z"
  FFMPEG_URL: "https://github.com/GyanD/codexffmpeg/releases/download/2026-06-08-git-6028720d70/ffmpeg-2026-06-08-git-6028720d70-essentials_build.7z"
  FFMPEG_LINUX_ARM64_URL: "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-linuxarm64-gpl-8.1.tar.xz"

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and Prepare MPV/FFmpeg
        shell: powershell
        run: |
          # 优先从项目 Release 下载带 CAVS Guangdian profile 支持的 libmpv
          # 如果 Release 不存在（未构建过），fallback 到官方 shinchiro 构建
          $cavsUrl = "https://github.com/${{ github.repository }}/releases/download/libmpv-cavs-latest/mpv-dev-x86_64-cavs.7z"
          try {
            Write-Host "Downloading CAVS-enabled libmpv from: $cavsUrl"
            Invoke-WebRequest -Uri $cavsUrl -OutFile "mpv.7z" -ErrorAction Stop
            Write-Host "Successfully downloaded CAVS-enabled libmpv"
          } catch {
            Write-Host "CAVS-enabled libmpv not found, falling back to official shinchiro build"
            Write-Host "Downloading mpv from: $env:MPV_URL"
            Invoke-WebRequest -Uri $env:MPV_URL -OutFile "mpv.7z"
          }
          7z x mpv.7z -ompv -y
          dir ./mpv

          Write-Host "Downloading ffmpeg from: $env:FFMPEG_URL"
          Invoke-WebRequest -Uri $env:FFMPEG_URL -OutFile "ffmpeg.7z"
          $ffmpegExtractDir = "_ffmpeg_extract"
          7z x ffmpeg.7z "-o$ffmpegExtractDir" -y

          $ffmpegBin = Get-ChildItem -Path $ffmpegExtractDir -Directory -Recurse |
            Where-Object { Test-Path (Join-Path $_.FullName "ffmpeg.exe") } |
            Select-Object -First 1

          if ($null -eq $ffmpegBin) {
            throw "Could not find ffmpeg.exe after extracting ffmpeg.7z."
          }
          if (Test-Path ".\ffmpeg") {
            Remove-Item ".\ffmpeg" -Recurse -Force
          }
          Move-Item -Path $ffmpegBin.FullName -Destination ".\ffmpeg"
          dir ./ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.5"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.20.0

      - name: Build executable
        run: python build.py

      - name: Verify and rename executable
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/IPTV Scanner Editor Pro.exe")) {
            throw "Expected executable was not found"
          }
          Move-Item "dist/IPTV Scanner Editor Pro.exe" "dist/IPTV Scanner Editor Pro-Windows-x86_64.exe" -Force

      - name: Package libmpv fallback
        shell: pwsh
        run: |
          # 将 mpv/ 目录打包为 zip，作为 fallback 供用户手动下载
          # 当 onefile 模式解压 libmpv-2.dll 失败时，用户可从此 zip 提取 dll 放到 exe 同级目录
          if (Test-Path "mpv/libmpv-2.dll") {
            Compress-Archive -Path "mpv/libmpv-2.dll" -DestinationPath "dist/libmpv-fallback-windows.zip" -Force
            Write-Host "Created libmpv-fallback-windows.zip"
          } else {
            Write-Host "WARNING: mpv/libmpv-2.dll not found, skipping fallback package"
          }

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: |
            dist/IPTV Scanner Editor Pro-Windows-x86_64.exe
            dist/libmpv-fallback-windows.zip
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download CAVS-enabled libmpv (macOS)
        # 优先从项目 Release 下载带 CAVS + AVS2 支持的 libmpv
        # 如果 Release 不存在，fallback 到 Homebrew（无 CAVS/AVS2 支持）
        run: |
          brew install ffmpeg
          mkdir -p mpv
          CAVS_URL="https://github.com/${{ github.repository }}/releases/download/libmpv-cavs-latest/libmpv-cavs-macos-arm64.tar.gz"
          if curl -fsSL "$CAVS_URL" -o /tmp/cavs-libmpv.tar.gz; then
            echo "Downloaded CAVS-enabled libmpv from: $CAVS_URL"
            mkdir -p /tmp/cavs-libmpv
            tar xzf /tmp/cavs-libmpv.tar.gz -C /tmp/cavs-libmpv
            cp /tmp/cavs-libmpv/libmpv-cavs-macos-arm64/lib/*.dylib mpv/
            echo "Using CAVS-enabled libmpv"
          else
            echo "CAVS-enabled libmpv not found, falling back to Homebrew"
            brew install mpv
            cp /opt/homebrew/lib/libmpv.2.dylib mpv/ || cp /usr/local/lib/libmpv.2.dylib mpv/
          fi
          ls -la mpv/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.5"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.20.0

      - name: Build .app
        run: python build.py

      - name: Package .app as zip
        run: |
          cd dist
          zip -r "IPTV Scanner Editor Pro-macOS-ARM64.zip" "IPTV Scanner Editor Pro.app"

      - name: Upload .app to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: dist/IPTV Scanner Editor Pro-macOS-ARM64.zip
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-x86_64:
    name: Build Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg libxcb-cursor0 libass-dev zlib1g-dev libjpeg-dev

      - name: Download CAVS-enabled libmpv (Linux x86_64)
        # 优先从项目 Release 下载带 CAVS + AVS2 支持的 libmpv
        # 如果 Release 不存在，fallback 到 apt（无 CAVS/AVS2 支持）
        run: |
          mkdir -p mpv ffmpeg
          CAVS_URL="https://github.com/${{ github.repository }}/releases/download/libmpv-cavs-latest/libmpv-cavs-linux-x86_64.tar.gz"
          if curl -fsSL "$CAVS_URL" -o /tmp/cavs-libmpv.tar.gz; then
            echo "Downloaded CAVS-enabled libmpv from: $CAVS_URL"
            mkdir -p /tmp/cavs-libmpv
            tar xzf /tmp/cavs-libmpv.tar.gz -C /tmp/cavs-libmpv
            cp /tmp/cavs-libmpv/libmpv-cavs-linux-x86_64/lib/*.so* mpv/
            echo "Using CAVS-enabled libmpv"
          else
            echo "CAVS-enabled libmpv not found, falling back to apt"
            sudo apt install -y libmpv-dev
            cp /usr/lib/x86_64-linux-gnu/libmpv.so.2 mpv/ 2>/dev/null || cp /usr/lib/libmpv.so.2 mpv/ 2>/dev/null || true
          fi
          cp /usr/bin/ffprobe ffmpeg/
          cp /usr/bin/ffmpeg ffmpeg/ 2>/dev/null || true
          chmod +x ffmpeg/ffprobe ffmpeg/ffmpeg 2>/dev/null || true
          ls -la mpv/ ffmpeg/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.5"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.20.0

      - name: Build executable
        run: python build.py

      - name: Verify executable
        run: |
          if [ ! -f "dist/IPTV Scanner Editor Pro" ]; then
            echo "Expected executable was not found"
            exit 1
          fi
          chmod +x "dist/IPTV Scanner Editor Pro"
          file "dist/IPTV Scanner Editor Pro"

      - name: Compress executable
        run: |
          cd dist
          tar czf "IPTV Scanner Editor Pro-Linux-x86_64.tar.gz" "IPTV Scanner Editor Pro" "icons" "IPTV Scanner Editor Pro.desktop" "install.sh"

      - name: Upload executable to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: dist/IPTV Scanner Editor Pro-Linux-x86_64.tar.gz
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-arm64:
    name: Build Linux ARM64
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libxcb-cursor0 libass-dev zlib1g-dev libjpeg-dev

      - name: Download CAVS-enabled libmpv (Linux ARM64)
        # 优先从项目 Release 下载带 CAVS + AVS2 支持的 libmpv
        # 如果 Release 不存在，fallback 到 apt（无 CAVS/AVS2 支持）
        run: |
          mkdir -p mpv ffmpeg
          CAVS_URL="https://github.com/${{ github.repository }}/releases/download/libmpv-cavs-latest/libmpv-cavs-linux-arm64.tar.gz"
          if curl -fsSL "$CAVS_URL" -o /tmp/cavs-libmpv.tar.gz; then
            echo "Downloaded CAVS-enabled libmpv from: $CAVS_URL"
            mkdir -p /tmp/cavs-libmpv
            tar xzf /tmp/cavs-libmpv.tar.gz -C /tmp/cavs-libmpv
            cp /tmp/cavs-libmpv/libmpv-cavs-linux-arm64/lib/*.so* mpv/
            echo "Using CAVS-enabled libmpv"
          else
            echo "CAVS-enabled libmpv not found, falling back to apt"
            sudo apt install -y libmpv-dev
            cp /usr/lib/aarch64-linux-gnu/libmpv.so.2 mpv/ 2>/dev/null || cp /usr/lib/libmpv.so.2 mpv/ 2>/dev/null || true
          fi
          ls -la mpv/

      - name: Prepare FFmpeg
        run: |
          mkdir -p ffmpeg

          # Try BtbN FFmpeg build first
          echo "Trying BtbN FFmpeg ARM64 build..."
          wget -q "$FFMPEG_LINUX_ARM64_URL" -O /tmp/ffmpeg-arm64.tar.xz 2>/dev/null && {
            tar -xf /tmp/ffmpeg-arm64.tar.xz -C /tmp/
            find /tmp -name "ffprobe" -type f -exec cp {} ffmpeg/ \;
            find /tmp -name "ffmpeg" -type f -exec cp {} ffmpeg/ \;
          } || echo "BtbN download failed, trying apt..."

          # Fallback: use system ffmpeg from apt
          if [ ! -f ./ffmpeg/ffprobe ]; then
            echo "Using system ffmpeg from apt..."
            sudo apt install -y ffmpeg
            cp /usr/bin/ffprobe ffmpeg/
            cp /usr/bin/ffmpeg ffmpeg/
          fi

          if [ ! -f ./ffmpeg/ffprobe ]; then
            echo "ffprobe not found"
            exit 1
          fi

          chmod +x ffmpeg/ffprobe ffmpeg/ffmpeg 2>/dev/null || true
          ls -la ffmpeg/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.5"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.20.0

      - name: Build executable
        run: python build.py

      - name: Verify executable
        run: |
          if [ ! -f "dist/IPTV Scanner Editor Pro" ]; then
            echo "Expected executable was not found"
            exit 1
          fi
          chmod +x "dist/IPTV Scanner Editor Pro"
          file "dist/IPTV Scanner Editor Pro"

      - name: Compress executable
        run: |
          cd dist
          tar czf "IPTV Scanner Editor Pro-Linux-ARM64.tar.gz" "IPTV Scanner Editor Pro" "icons" "IPTV Scanner Editor Pro.desktop" "install.sh"

      - name: Upload executable to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: dist/IPTV Scanner Editor Pro-Linux-ARM64.tar.gz
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Python 3.11 (for Chaquopy)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Download CAVS-enabled libmpv for Android
        # 优先从项目 Release 下载带 CAVS + AVS2 支持的 libmpv .so 文件
        # 如果 Release 不存在，fallback 到官方 mpv-android APK（无 CAVS/AVS2 支持）
        working-directory: android
        run: |
          JNILIBS_DIR="app/src/main/jniLibs"
          mkdir -p "$JNILIBS_DIR"
          CAVS_URL="https://github.com/${{ github.repository }}/releases/download/libmpv-cavs-latest/libmpv-cavs-android.tar.gz"
          if curl -fsSL "$CAVS_URL" -o /tmp/cavs-libmpv-android.tar.gz; then
            echo "Downloaded CAVS-enabled libmpv from: $CAVS_URL"
            mkdir -p /tmp/cavs-android
            tar xzf /tmp/cavs-libmpv-android.tar.gz -C /tmp/cavs-android
            # 只下载 arm64-v8a 和 armeabi-v7a（与 build.gradle 的 ndk.abiFilters 一致）
            for arch in arm64-v8a armeabi-v7a; do
              if [ -d "/tmp/cavs-android/jniLibs/$arch" ]; then
                mkdir -p "$JNILIBS_DIR/$arch"
                cp /tmp/cavs-android/jniLibs/$arch/*.so "$JNILIBS_DIR/$arch/"
                echo "$arch .so files (CAVS):"
                ls -la "$JNILIBS_DIR/$arch/"
              else
                echo "WARNING: No CAVS .so files found for $arch"
              fi
            done
            echo "Using CAVS-enabled libmpv"
          else
            echo "CAVS-enabled libmpv not found, falling back to official mpv-android APK"
            BASE_URL="https://github.com/mpv-android/mpv-android/releases/download/2026-04-25"
            # 只下载 arm64-v8a 和 armeabi-v7a（与 build.gradle 的 ndk.abiFilters 一致）
            ARCHS=("arm64-v8a" "armeabi-v7a")
            for arch in "${ARCHS[@]}"; do
              APK="app-default-${arch}-release.apk"
              curl -fsSL -o "mpv-${arch}.apk" "${BASE_URL}/${APK}"
              echo "Downloaded mpv-${arch}.apk ($(ls -lh "mpv-${arch}.apk" | awk '{print $5}'))"
              mkdir -p "$JNILIBS_DIR/$arch"
              unzip -o "mpv-${arch}.apk" "lib/${arch}/*.so" -d /tmp/mpv-extract
              if [ -d "/tmp/mpv-extract/lib/${arch}" ]; then
                cp /tmp/mpv-extract/lib/${arch}/*.so "$JNILIBS_DIR/$arch/"
                echo "$arch .so files:"
                ls -la "$JNILIBS_DIR/$arch/"
              else
                echo "WARNING: No .so files found for $arch"
              fi
              rm -rf /tmp/mpv-extract
            done
          fi
          echo "=== Final jniLibs structure (before strip) ==="
          find "$JNILIBS_DIR" -name "*.so" -ls

          # Strip debug symbols from all .so files
          # 作为安全网：即使 build-libmpv-android.yml 已 strip，这里再确保一次
          # CAVS 构建（来自 release）的 .so 可能未 strip；mpv-android APK 的 .so 通常已 strip
          # 使用系统 strip（binutils），兼容所有 ABI 的 ELF 文件
          echo "=== Stripping debug symbols (safety net) ==="
          for so_file in $(find "$JNILIBS_DIR" -name "*.so" -type f); do
            before_size=$(stat -c%s "$so_file")
            strip --strip-debug "$so_file" 2>/dev/null || true
            after_size=$(stat -c%s "$so_file")
            saved=$(( before_size - after_size ))
            if [ "$saved" -gt 0 ]; then
              echo "  $(basename $so_file) ($arch): $(( before_size / 1048576 ))MB -> $(( after_size / 1048576 ))MB (saved $(( saved / 1048576 ))MB)"
            fi
          done
          echo "=== Final jniLibs structure (after strip) ==="
          find "$JNILIBS_DIR" -name "*.so" -ls

      - name: Create local.properties
        working-directory: android
        run: |
          # 查找 setup-python 安装的 Python 3.11 可执行文件路径
          PYTHON_PATH=$(which python3.11 2>/dev/null || which python3 2>/dev/null || echo "python3")
          echo "chaquopy.buildPython=$PYTHON_PATH" > local.properties
          echo "Using Python: $PYTHON_PATH"

      - name: Grant execute permission for gradlew
        working-directory: android
        run: chmod +x gradlew

      - name: Build arm64 release APK
        working-directory: android
        run: ./gradlew assembleRelease -PtargetAbi=arm64-v8a

      - name: Stash arm64 APK
        working-directory: android
        run: |
          mkdir -p apk-output
          cp "app/build/outputs/apk/release/IPTV Scanner Editor Pro-Android-arm64.apk" apk-output/

      - name: Build arm32 release APK
        working-directory: android
        run: ./gradlew assembleRelease -PtargetAbi=armeabi-v7a

      - name: Stash arm32 APK
        working-directory: android
        run: |
          cp "app/build/outputs/apk/release/IPTV Scanner Editor Pro-Android-arm32.apk" apk-output/

      - name: Verify APKs
        id: apk
        working-directory: android
        run: |
          echo "=== All APK files ==="
          ls -la apk-output/

          ARM64_APK="apk-output/IPTV Scanner Editor Pro-Android-arm64.apk"
          ARM32_APK="apk-output/IPTV Scanner Editor Pro-Android-arm32.apk"

          if [ ! -f "$ARM64_APK" ]; then
            echo "ERROR: arm64 APK not found"
            exit 1
          fi
          if [ ! -f "$ARM32_APK" ]; then
            echo "ERROR: arm32 APK not found"
            exit 1
          fi

          echo "arm64 APK: $ARM64_APK ($(ls -lh "$ARM64_APK" | awk '{print $5}'))"
          echo "arm32 APK: $ARM32_APK ($(ls -lh "$ARM32_APK" | awk '{print $5}'))"

          # 输出 glob 模式（相对于仓库根目录），匹配两个 APK
          echo "apk_glob=android/apk-output/IPTV Scanner Editor Pro-Android-arm*.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APKs to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: ${{ steps.apk.outputs.apk_glob }}
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

