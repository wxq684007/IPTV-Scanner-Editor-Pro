name: Build and Publish App

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to upload the executables to."
        required: true
        type: string

permissions:
  contents: write

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: utf-8
  MPV_URL: "https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/20260610/mpv-dev-x86_64-v3-20260610-git-304426c.7z"
  FFMPEG_URL: "https://github.com/GyanD/codexffmpeg/releases/download/2026-06-08-git-6028720d70/ffmpeg-2026-06-08-git-6028720d70-essentials_build.7z"
  FFMPEG_LINUX_ARM64_URL: "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-linuxarm64-gpl-8.1.tar.xz"

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and Prepare MPV/FFmpeg
        shell: powershell
        run: |
          # 优先从项目 Release 下载带 CAVS Guangdian profile 支持的 libmpv
          # 如果 Release 不存在（未构建过），fallback 到官方 shinchiro 构建
          $cavsUrl = "https://github.com/${{ github.repository }}/releases/download/libmpv-cavs-latest/mpv-dev-x86_64-cavs.7z"
          try {
            Write-Host "Downloading CAVS-enabled libmpv from: $cavsUrl"
            Invoke-WebRequest -Uri $cavsUrl -OutFile "mpv.7z" -ErrorAction Stop
            Write-Host "Successfully downloaded CAVS-enabled libmpv"
          } catch {
            Write-Host "CAVS-enabled libmpv not found, falling back to official shinchiro build"
            Write-Host "Downloading mpv from: $env:MPV_URL"
            Invoke-WebRequest -Uri $env:MPV_URL -OutFile "mpv.7z"
          }
          7z x mpv.7z -ompv -y
          dir ./mpv

          Write-Host "Downloading ffmpeg from: $env:FFMPEG_URL"
          Invoke-WebRequest -Uri $env:FFMPEG_URL -OutFile "ffmpeg.7z"
          $ffmpegExtractDir = "_ffmpeg_extract"
          7z x ffmpeg.7z "-o$ffmpegExtractDir" -y

          $ffmpegBin = Get-ChildItem -Path $ffmpegExtractDir -Directory -Recurse |
            Where-Object { Test-Path (Join-Path $_.FullName "ffmpeg.exe") } |
            Select-Object -First 1

          if ($null -eq $ffmpegBin) {
            throw "Could not find ffmpeg.exe after extracting ffmpeg.7z."
          }
          if (Test-Path ".\ffmpeg") {
            Remove-Item ".\ffmpeg" -Recurse -Force
          }
          Move-Item -Path $ffmpegBin.FullName -Destination ".\ffmpeg"
          dir ./ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.5"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.20.0

      - name: Build executable
        run: python build.py

      - name: Verify and rename executable
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/IPTV Scanner Editor Pro.exe")) {
            throw "Expected executable was not found"
          }
          Move-Item "dist/IPTV Scanner Editor Pro.exe" "dist/IPTV Scanner Editor Pro-Windows-x86_64.exe" -Force

      - name: Package libmpv fallback
        shell: pwsh
        run: |
          # 将 mpv/ 目录打包为 zip，作为 fallback 供用户手动下载
          # 当 onefile 模式解压 libmpv-2.dll 失败时，用户可从此 zip 提取 dll 放到 exe 同级目录
          if (Test-Path "mpv/libmpv-2.dll") {
            Compress-Archive -Path "mpv/libmpv-2.dll" -DestinationPath "dist/libmpv-fallback-windows.zip" -Force
            Write-Host "Created libmpv-fallback-windows.zip"
          } else {
            Write-Host "WARNING: mpv/libmpv-2.dll not found, skipping fallback package"
          }

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: |
            dist/IPTV Scanner Editor Pro-Windows-x86_64.exe
            dist/libmpv-fallback-windows.zip
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MPV and FFmpeg via Homebrew
        run: |
          brew install mpv ffmpeg
          mkdir -p mpv
          cp /opt/homebrew/lib/libmpv.2.dylib mpv/ || cp /usr/local/lib/libmpv.2.dylib mpv/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.5"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.20.0

      - name: Build .app
        run: python build.py

      - name: Package .app as zip
        run: |
          cd dist
          zip -r "IPTV Scanner Editor Pro-macOS-ARM64.zip" "IPTV Scanner Editor Pro.app"

      - name: Upload .app to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: dist/IPTV Scanner Editor Pro-macOS-ARM64.zip
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-x86_64:
    name: Build Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libmpv-dev ffmpeg libxcb-cursor0

      - name: Prepare dependencies
        run: |
          mkdir -p mpv ffmpeg
          cp /usr/lib/x86_64-linux-gnu/libmpv.so.2 mpv/ 2>/dev/null || cp /usr/lib/libmpv.so.2 mpv/ 2>/dev/null || true
          cp /usr/bin/ffprobe ffmpeg/
          cp /usr/bin/ffmpeg ffmpeg/ 2>/dev/null || true
          chmod +x ffmpeg/ffprobe ffmpeg/ffmpeg 2>/dev/null || true
          ls -la mpv/ ffmpeg/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.5"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.20.0

      - name: Build executable
        run: python build.py

      - name: Verify executable
        run: |
          if [ ! -f "dist/IPTV Scanner Editor Pro" ]; then
            echo "Expected executable was not found"
            exit 1
          fi
          chmod +x "dist/IPTV Scanner Editor Pro"
          file "dist/IPTV Scanner Editor Pro"

      - name: Compress executable
        run: |
          cd dist
          tar czf "IPTV Scanner Editor Pro-Linux-x86_64.tar.gz" "IPTV Scanner Editor Pro" "icons" "IPTV Scanner Editor Pro.desktop" "install.sh"

      - name: Upload executable to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: dist/IPTV Scanner Editor Pro-Linux-x86_64.tar.gz
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-arm64:
    name: Build Linux ARM64
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libmpv-dev libxcb-cursor0

      - name: Prepare FFmpeg
        run: |
          mkdir -p ffmpeg

          # Try BtbN FFmpeg build first
          echo "Trying BtbN FFmpeg ARM64 build..."
          wget -q "$FFMPEG_LINUX_ARM64_URL" -O /tmp/ffmpeg-arm64.tar.xz 2>/dev/null && {
            tar -xf /tmp/ffmpeg-arm64.tar.xz -C /tmp/
            find /tmp -name "ffprobe" -type f -exec cp {} ffmpeg/ \;
            find /tmp -name "ffmpeg" -type f -exec cp {} ffmpeg/ \;
          } || echo "BtbN download failed, trying apt..."

          # Fallback: use system ffmpeg from apt
          if [ ! -f ./ffmpeg/ffprobe ]; then
            echo "Using system ffmpeg from apt..."
            sudo apt install -y ffmpeg
            cp /usr/bin/ffprobe ffmpeg/
            cp /usr/bin/ffmpeg ffmpeg/
          fi

          if [ ! -f ./ffmpeg/ffprobe ]; then
            echo "ffprobe not found"
            exit 1
          fi

          chmod +x ffmpeg/ffprobe ffmpeg/ffmpeg 2>/dev/null || true
          ls -la ffmpeg/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.5"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.20.0

      - name: Build executable
        run: python build.py

      - name: Verify executable
        run: |
          if [ ! -f "dist/IPTV Scanner Editor Pro" ]; then
            echo "Expected executable was not found"
            exit 1
          fi
          chmod +x "dist/IPTV Scanner Editor Pro"
          file "dist/IPTV Scanner Editor Pro"

      - name: Compress executable
        run: |
          cd dist
          tar czf "IPTV Scanner Editor Pro-Linux-ARM64.tar.gz" "IPTV Scanner Editor Pro" "icons" "IPTV Scanner Editor Pro.desktop" "install.sh"

      - name: Upload executable to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: dist/IPTV Scanner Editor Pro-Linux-ARM64.tar.gz
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Python 3.11 (for Chaquopy)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Download mpv native libraries for Android
        working-directory: android
        run: |
          # 下载所有 4 种架构的 mpv APK 来提取 .so 文件
          BASE_URL="https://github.com/mpv-android/mpv-android/releases/download/2026-04-25"
          ARCHS=("arm64-v8a" "armeabi-v7a" "x86_64" "x86")

          for arch in "${ARCHS[@]}"; do
            APK="app-default-${arch}-release.apk"
            curl -fsSL -o "mpv-${arch}.apk" "${BASE_URL}/${APK}"
            echo "Downloaded mpv-${arch}.apk ($(ls -lh "mpv-${arch}.apk" | awk '{print $5}'))"
          done

      - name: Extract mpv native libraries for Android
        working-directory: android
        run: |
          JNILIBS_DIR="app/src/main/jniLibs"
          ARCHS=("arm64-v8a" "armeabi-v7a" "x86_64" "x86")

          for arch in "${ARCHS[@]}"; do
            mkdir -p "$JNILIBS_DIR/$arch"
            unzip -o "mpv-${arch}.apk" "lib/${arch}/*.so" -d /tmp/mpv-extract
            if [ -d "/tmp/mpv-extract/lib/${arch}" ]; then
              cp /tmp/mpv-extract/lib/${arch}/*.so "$JNILIBS_DIR/$arch/"
              echo "$arch .so files:"
              ls -la "$JNILIBS_DIR/$arch/"
            else
              echo "WARNING: No .so files found for $arch"
            fi
            rm -rf /tmp/mpv-extract
          done

      - name: Create local.properties
        working-directory: android
        run: |
          # 查找 setup-python 安装的 Python 3.11 可执行文件路径
          PYTHON_PATH=$(which python3.11 2>/dev/null || which python3 2>/dev/null || echo "python3")
          echo "chaquopy.buildPython=$PYTHON_PATH" > local.properties
          echo "Using Python: $PYTHON_PATH"

      - name: Grant execute permission for gradlew
        working-directory: android
        run: chmod +x gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --rerun-tasks

      - name: Verify APKs
        id: apk
        working-directory: android
        run: |
          # APK 按 ABI 拆分（productFlavors），生成 4 个 APK：
          # - arm64-v8a (现代手机/电视盒子)
          # - armeabi-v7a (老旧 32 位 ARM)
          # - x86_64 / x86 (模拟器)
          APK_DIR="app/build/outputs/apk"
          APK_COUNT=$(find "$APK_DIR" -name "IPTV Scanner Editor Pro-Android-*.apk" -type f | wc -l)
          echo "Found $APK_COUNT APK files:"
          find "$APK_DIR" -name "IPTV Scanner Editor Pro-Android-*.apk" -type f -exec ls -la {} \;
          if [ "$APK_COUNT" -lt 4 ]; then
            echo "Expected at least 4 APKs (one per ABI), found $APK_COUNT"
            exit 1
          fi
          # 用 glob 模式匹配所有 APK（softprops/action-gh-release 支持）
          echo "apk_glob=android/app/build/outputs/apk/**/IPTV Scanner Editor Pro-Android-*.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APKs to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: ${{ steps.apk.outputs.apk_glob }}
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

